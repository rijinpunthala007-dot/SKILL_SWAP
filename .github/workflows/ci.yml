name: SkillSwap CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    name: Server — Lint, Typecheck, Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/skillswap_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-at-least-16-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CLIENT_URL: http://localhost:5173
          RATE_LIMIT_WINDOW_MS: "900000"
          RATE_LIMIT_MAX: "1000"
          AUTH_RATE_LIMIT_MAX: "1000"

      - name: Build
        run: npm run build

  client:
    name: Client — Typecheck, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  e2e:
    name: E2E — Critical Journeys
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.ref == 'refs/heads/main'

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start server
        working-directory: server
        run: npm run dev &
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/skillswap_e2e
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-at-least-16-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CLIENT_URL: http://localhost:5173
          RATE_LIMIT_WINDOW_MS: "900000"
          RATE_LIMIT_MAX: "1000"
          AUTH_RATE_LIMIT_MAX: "1000"

      - name: Start client
        working-directory: client
        run: npm run dev &
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Wait for services
        run: npx wait-on http://localhost:5000/api/health http://localhost:5173 --timeout 30000

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
